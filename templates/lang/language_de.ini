[INTRO]
SUMMARY="Erste Einrichtung"
SUMMARY_HINT="Aufklappen für die Schritte in Kurzform"
TITLE="Bedienung in wenigen Schritten"
LEAD="Dieses Plugin holt Ihre offiziellen Abholtermine von api.abfall.io (wie auf der Webseite Ihrer Kommune), sobald Entsorgungsregion und Adresse konfiguriert sind."
STEP1="Reiter „Standort“: zuerst Entsorgungsregion wählen (oder Service-Key) und speichern, danach Straße und ggf. Hausnummer wählen und speichern. Weitere Optionen (Intervall, MQTT) unter „Einstellungen“."
STEP2="Reiter „Status & Daten“: einmal „Jetzt abrufen“ — danach erscheinen die nächsten Termine in der Tabelle."
STEP3="Reiter „Einstellungen“ (optional, wenn alles grundsätzlich läuft): Wie oft abgerufen wird, welche Tonnen angezeigt werden, und ob die Termine in den Loxone-Miniserver (als Zahl im virtuellen Eingang) und/oder per MQTT an andere Systeme (App, Heimautomation, Skript) gesendet werden. Eine verständliche Erklärung dazu finden Sie im gleichen Reiter etwas weiter unten."
STEP4="Etwas klappt nicht? Reiter „Protokoll“ — die letzten Meldungen helfen bei der Fehlersuche (kein verpflichtender Support, siehe rechtliche Hinweise unten)."
FOOTNOTE="Daten kommen ausschließlich von api.abfall.io. Technisch wird der Kalender im Hintergrund als „ICS“-Feed geliefert. Es gibt keinen fest eingebauten Standard-Ort — Sie müssen Ihre Region in den Einstellungen wählen."
LEGAL_SUMMARY="Rechtliches: kein offizieller Support, Fair-Use, eigenes Risiko (anklicken)"
LEGAL_BLOCK_HTML="<p>Dieses Plugin ist eine <strong>unabhängige Community-Entwicklung</strong> (LoxBerry). Es steht in <strong>keiner</strong> offiziellen Beziehung zu den Betreibern von api.abfall.io / AbfallPlus. Es gibt <strong>keinen</strong> Anspruch auf Unterstützung durch diese Dienste oder durch die Autoren des Repos; <strong>kein kostenpflichtiger Support</strong> für Endanwender.</p><p>Die Anbindung nutzt <strong>öffentlich erreichbare</strong> HTTP-Schnittstellen (vergleichbar mit Browser/Kalender-Export). Automatische Abrufe sind auf mindestens <strong>6 Stunden</strong> Abstand ausgelegt, damit Server nicht unnötig belastet werden — bitte nicht umgehen.</p><p>API und Inhalte können <strong>jederzeit wegfallen oder sich ändern</strong>. Nutzung auf <strong>eigenes Risiko</strong>. Ausführlich: <code>DISCLAIMER.md</code> im GitHub-Repository.</p>"

