SECTION_INTEGRATION="Loxone, MQTT und JSON: Wofür ist was?"
HELP_INTEGRATION_INTRO="Drei gängige Wege, die Termine in Haus und Technik zu nutzen — Sie brauchen nicht alle, nur passende:"
HELP_INTEGRATION_BULLET_LOXONE="Loxone (virtueller HTTP-Eingang): Der Miniserver ruft regelmäßig eine Adresse (loxone.php) ab und bekommt pro Abfallart z. B. Tage bis zur Leerung. Vorteil: steueren und anzeigen direkt in Loxone, ohne extra MQTT. Typisch für Ihre Loxone-App und Visualisierungen."
HELP_INTEGRATION_BULLET_MQTT="MQTT: Nach jedem Abruf des Plugins werden aktuelle Werte (Tage, Datum, Wochentag, …) an Themen (Topics) geschickt. Vorteil: mehrere Ziele gleichzeitig (z. B. Heim-Automation, Handy, Display), sogar parallel zu Loxone, wenn Ihr System MQTT versteht."
HELP_INTEGRATION_BULLET_JSON="JSON-URL: Ein Komplett-Snapshot (alle Kategorien) per Browser oder Skript, z. B. an die öffentliche Adresse den Zusatz „?format=json“ anhängen. Vorteil: schnell testen und in Programme einbinden, ohne Loxone und ohne MQTT. Im Plugin muss zuerst mindestens einmal „Jetzt abrufen“ klappen."

