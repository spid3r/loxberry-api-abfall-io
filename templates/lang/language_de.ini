HELP_LOXONE_ENDPOINT="In Loxone Config pro Bedarf einen <strong>virtuellen HTTP-Eingang</strong> anlegen und die URL unten eintragen. Polling-Intervall bewusst nicht zu oft (z. B. stündlich reicht) — Werte ändern sich nur, wenn der nächste Abholtag näher rückt."
TITLE_LOXONE_PATTERNS="Befehle im virtuellen HTTP-Eingang"
HELP_LOXONE_PATTERNS="Für jede Abfallart einen eigenen Befehl, damit in Loxone pro Tonne z. B. die Anzahl Tage bis zur Leerung ankommt (als Zahl, gut für Logik und Anzeigen):"
