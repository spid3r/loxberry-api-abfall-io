[INTRO]
SUMMARY="Erste Einrichtung"
SUMMARY_HINT="Aufklappen für die Schritte in Kurzform"
TITLE="Bedienung in wenigen Schritten"
LEAD="Dieses Plugin holt Ihre offiziellen Abholtermine von api.abfall.io (wie auf der Webseite Ihrer Kommune). In wenigen Schritten eingerichtet:"
STEP1="Oben den Reiter „Standort“ öffnen, Straße und ggf. Hausnummer wählen und speichern."
STEP2="Reiter „Status & Daten“: einmal „Jetzt abrufen“ — danach erscheinen die nächsten Termine in der Tabelle."
STEP3="Reiter „Einstellungen“ (optional, wenn alles grundsätzlich läuft): Wie oft abgerufen wird, welche Tonnen angezeigt werden, und ob die Termine in den Loxone-Miniserver (als Zahl im virtuellen Eingang) und/oder per MQTT an andere Systeme (App, Heimautomation, Skript) gesendet werden. Eine verständliche Erklärung dazu finden Sie im gleichen Reiter etwas weiter unten."
STEP4="Etwas klappt nicht? Reiter „Protokoll“ — die letzten Meldungen helfen Ihnen oder dem Support."
FOOTNOTE="Daten kommen ausschließlich von api.abfall.io. Technisch wird der Kalender im Hintergrund als „ICS“-Feed geliefert — für Sie wichtig ist nur, dass es die offiziellen Termine Ihrer Stelle sind."

