HELP_LOXONE_SINGLE="Eine kürzere Adresse, wenn Sie nur eine Abfallart im Miniserver brauchen. Antwort: eine Zahl, die Tage bis zur Leerung bedeutet."
LABEL_LOXONE_LIST="Kategorien auflisten"
HELP_LOXONE_LIST="Hilft beim Anlegen der Befehle."
LABEL_LOXONE_JSON="JSON (andere Systeme)"
HELP_LOXONE_JSON="Dieselben Daten als eine JSON-Datei (alle Kategorien) — an die Adresse „?format=json“ anhängen. Gut für Heim-Automation oder Skripte ohne Loxone und ohne MQTT. Ohne diesen Zusatz zeigt der Browser die Kurz-Hilfeseite."
