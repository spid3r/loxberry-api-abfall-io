SECTION_FETCHING="Fetching"
LABEL_INTERVAL="Fetch interval (hours, minimum 6)"
HELP_INTERVAL="A minimum of 6 hours between scheduled fetches is enforced to use the public service fairly. Longer intervals (e.g. 12–24) are often enough for a household. Please do not try to increase load on upstream servers."
LABEL_FUZZ="Fuzz factor (± minutes)"
HELP_FUZZ="Adds a small random delay so not every LoxBerry calls the server at the same second. 30 minutes default is usually fine."
LABEL_CATEGORIES="Category filter"
HELP_CATEGORIES="After at least one successful fetch, use the checklist or type names (comma-separated). Names must match the waste feed. Leave empty for all categories."
