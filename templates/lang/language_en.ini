SECTION_INTEGRATION="Loxone, MQTT, and JSON: what to use when"
HELP_INTEGRATION_INTRO="Three common ways to use the dates at home — pick what fits; you do not need all of them:"
HELP_INTEGRATION_BULLET_LOXONE="Loxone (Virtual HTTP Input): the Miniserver polls a small URL (loxone.php) on a schedule and gets, for each waste type, e.g. days until collection. Best for staying inside Loxone (visualisation, logic) without running MQTT. Typical for Loxone-only setups."
HELP_INTEGRATION_BULLET_MQTT="MQTT: after every fetch, the plugin publishes fresh values (days, date, weekday, …) to topics. Best when many subscribers (e.g. Home Assistant, other hubs, a wall display) should all see the same data, often alongside Loxone if those systems use MQTT too."
HELP_INTEGRATION_BULLET_JSON="JSON on the public page: a full snapshot (all categories) for a browser, Home Assistant, or a script, e.g. add ?format=json to the public URL. Best for quick tests or tools that do not use Loxone or MQTT. You must have run “Fetch now” in the plugin at least once."

