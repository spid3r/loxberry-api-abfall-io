[INTRO]
SUMMARY="First-time setup"
SUMMARY_HINT="Open for step-by-step instructions"
TITLE="How to use this plugin (quick guide)"
LEAD="This plugin fetches your official collection dates from api.abfall.io (the same data your council shows online) after you have set your service region and address."
STEP1="Open the “Location” tab: first pick your waste region (or enter the 32-char service key) and save. Then search your street and house number if asked, and save. Interval, MQTT, etc. stay under “Settings”."
STEP2="Open “Status & data” and press “Fetch now”. The next pickups then appear in the table."
STEP3="Open “Settings” when you are ready (optional): how often to fetch, which bin types to show, and whether to send dates into your Loxone Miniserver (virtual input) and/or out via MQTT to other systems. Further down on the same tab, a short explanation compares Loxone, MQTT, and JSON."
STEP4="Something wrong? Open “Log” — the last lines help you debug (no guaranteed support; see legal notice below)."
FOOTNOTE="Data always comes from api.abfall.io. Technically the schedule is delivered as a background “ICS” web feed. There is no silent default city — you must choose a region on the Location tab first."
LEGAL_SUMMARY="Legal: not official, no support guarantee, fair use (expand)"
LEGAL_BLOCK_HTML="<p>This plugin is an <strong>independent community project</strong> for LoxBerry. It is <strong>not</strong> affiliated with the operators of api.abfall.io / AbfallPlus. They (and the authors of this repository) <strong>do not</strong> provide any obligation to help you. <strong>No end-user support is promised.</strong></p><p>Access uses <strong>publicly reachable</strong> HTTP usage similar to a browser. Scheduled fetches are limited to a <strong>minimum of 6 hours</strong> between runs to keep load reasonable — do not try to work around that.</p><p>The service may <strong>change or stop at any time</strong>. Use is <strong>at your own risk</strong>. Full text: <code>DISCLAIMER.md</code> in the repository.</p>"

