[INTRO]
SUMMARY="First-time setup"
SUMMARY_HINT="Open for step-by-step instructions"
TITLE="How to use this plugin (quick guide)"
LEAD="This plugin fetches your official collection dates from api.abfall.io (the same data your council shows online). Just a few steps:"
STEP1="Open the “Location” tab at the top, pick your street (and house number if asked), then save."
STEP2="Open “Status & data” and press “Fetch now”. The next pickups then appear in the table."
STEP3="Open “Settings” when you are ready (optional): how often to fetch, which bin types to show, and whether to send dates into your Loxone Miniserver (virtual input) and/or out via MQTT to other systems. Further down on the same tab, a short explanation compares Loxone, MQTT, and JSON."
STEP4="Something wrong? Open “Log” — the last lines help you or support."
FOOTNOTE="Data always comes from api.abfall.io. Technically the schedule is delivered as a background “ICS” web feed; what matters for you is that these are the official dates for your address."

[PUBLIC]
