# Keeps GitHub Actions and npm dependencies on current minor/patch updates.
# Review PRs; major bumps (e.g. actions/checkout v5) need manual check.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
